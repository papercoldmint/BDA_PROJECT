version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: bda-minio
    ports:
      - "9000:9000"    # API Port: Untuk koneksi Python/Spark nanti
      - "9001:9001"    # Console Port: Untuk kita buka di browser
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data:
  